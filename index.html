<meta charset="utf-8">
<title>彩虹六号 · 防守装修规划器</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root{
    --bg:#0E1116;--bg2:#11161d;--panel:#161B22;--line:#26303c;--line2:#33414f;
    --ink:#C7D0DB;--ink-dim:#8B97A6;--ink-faint:#63707f;--amber:#E8873A;
    --reinforce:#E8873A;--gadget:#9A7BE0;--vertical:#E5484D;--angle:#4C9BE8;--roam:#46B36B;
    --font-cjk:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;--sh:0 8px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{background:radial-gradient(1100px 600px at 82% -10%,#16202b 0,transparent 60%),var(--bg);color:var(--ink);font-family:var(--font-cjk);font-size:15px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1360px;margin:0 auto;padding:18px 18px 40px}.mono{font-family:var(--font-mono)}
  header.top{display:flex;flex-wrap:wrap;gap:12px 24px;align-items:flex-end;justify-content:space-between;padding:4px 0 14px;border-bottom:1px solid var(--line)}
  .brand .ey{font-family:var(--font-mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--amber);font-weight:600}
  .brand h1{font-size:23px;margin:5px 0 0;font-weight:800}.brand h1 small{display:block;font-size:13px;font-weight:500;color:var(--ink-dim);margin-top:5px}
  .verchip{font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);border:1px solid var(--line2);border-radius:999px;padding:6px 12px;background:var(--panel)}.verchip b{color:var(--amber)}

  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:14px 0 10px}
  .fbtn{cursor:pointer;font-size:13px;font-weight:700;color:var(--ink-dim);padding:8px 16px;border:1px solid var(--line2);border-radius:9px;background:var(--panel)}
  .fbtn.on{color:#12161b;background:var(--amber);border-color:var(--amber)}.fbtn .en{font-family:var(--font-mono);font-size:10px;opacity:.75;margin-left:5px}
  .fnote{font-size:12px;color:var(--ink-dim);margin-left:6px}.spacer{flex:1}
  .tog{cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:7px 12px;display:inline-flex;align-items:center;gap:7px}
  .tog .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-faint)}.tog.on{border-color:var(--amber)}.tog.on .dot{background:var(--amber)}

  .stage-wrap{display:grid;grid-template-columns:1fr 278px;gap:14px;align-items:start}
  .viewer{position:relative;width:100%;height:min(78vh,860px);background:#0b0f14;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--sh);cursor:grab;touch-action:none;user-select:none}
  .viewer.grabbing{cursor:grabbing}
  body.painting .viewer{cursor:crosshair}
  .canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  .canvas canvas{display:block;position:relative;z-index:1;width:1374px;height:1048px;max-width:none;pointer-events:none}
  #refimg{position:absolute;left:0;top:0;width:1374px;height:1048px;max-width:none;z-index:0;pointer-events:none;-webkit-user-drag:none;opacity:.92;display:none}
  .ov{position:absolute;inset:0;overflow:hidden}
  .m{position:absolute;transform:translate(-50%,-50%);pointer-events:none;text-align:center}
  .lbl{white-space:nowrap}
  .lbl .cn{font-weight:800;font-size:14px;color:#eef4fa;text-shadow:0 1px 3px #000,0 0 4px #000}
  .lbl .en{display:block;font-family:var(--font-mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:#c8d3de;margin-top:1px;text-shadow:0 1px 2px #000}
  .lbl .kd{display:block;font-size:9.5px;color:#b6c2ce;margin-top:1px;text-shadow:0 1px 2px #000}
  .lbl.obj .cn{color:#FFD489}.lbl.ext .cn{color:#cfe0ef;font-size:13px}
  .bomb{width:30px;height:30px;border-radius:9px;background:linear-gradient(160deg,#FF5A3C,#E31E2E);color:#fff;font-weight:800;font-size:13.5px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);border:2px solid #fff;box-shadow:0 0 14px rgba(255,64,52,.8),0 2px 8px #000a}
  .hs{cursor:pointer;pointer-events:auto;width:24px;height:24px;border-radius:50%;border:2px solid #0c1015;box-shadow:0 2px 7px #0009;transition:transform .12s}
  .hs:hover{transform:scale(1.15)}
  .hs.reinforce{background:var(--reinforce)}.hs.gadget{background:var(--gadget)}.hs.vertical{background:var(--vertical)}.hs.angle{background:var(--angle)}.hs.roam{background:var(--roam)}

  .zc{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:6px;z-index:6}
  .zc button{width:38px;height:38px;border-radius:9px;border:1px solid var(--line2);background:rgba(16,21,28,.92);color:var(--ink);font-size:19px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px)}
  .zc button:hover{border-color:var(--amber);color:var(--amber)}.zc button.wide{height:auto;padding:7px 0;font-size:11px;font-family:var(--font-cjk)}
  .zc .lvl{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);text-align:center;background:rgba(16,21,28,.92);border:1px solid var(--line2);border-radius:7px;padding:3px 0}
  .hint{position:absolute;left:12px;bottom:11px;font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);background:rgba(10,14,19,.72);border:1px solid var(--line);border-radius:6px;padding:4px 8px;z-index:6;pointer-events:none;max-width:70%}

  .side{display:flex;flex-direction:column;gap:12px;position:sticky;top:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
  .card h3{margin:0 0 9px;font-size:13px;font-weight:800}.card h3 .mono{font-size:9px;color:var(--ink-faint);letter-spacing:.14em;margin-left:6px}
  .leg{display:flex;flex-direction:column;gap:7px;font-size:12px;color:var(--ink-dim)}
  .leg .row{display:flex;align-items:center;gap:8px}.leg .sw{width:16px;height:16px;border-radius:4px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:9px;border:1px solid var(--line2)}
  .layers{display:flex;flex-direction:column;gap:6px}
  .lbtn{cursor:pointer;display:flex;align-items:center;gap:8px;border:1px solid var(--line2);background:var(--bg2);border-radius:8px;padding:6px 9px;font-size:12.5px;font-weight:600;color:var(--ink-dim)}
  .lbtn .d{width:11px;height:11px;border-radius:50%}
  .lbtn.on{color:#12161b}.lbtn.on.reinforce{background:var(--reinforce)}.lbtn.on.gadget{background:var(--gadget)}.lbtn.on.vertical{background:var(--vertical)}.lbtn.on.angle{background:var(--angle)}.lbtn.on.roam{background:var(--roam)}
  .disabledcard{opacity:.5}.note2f{font-size:11.5px;color:var(--ink-faint);line-height:1.5}

  #pop{position:fixed;z-index:30;max-width:320px;background:#0c1119;border:1px solid var(--line2);border-radius:11px;box-shadow:var(--sh);display:none}
  #pop .ph{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid var(--line)}
  #pop .ph .tag{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:5px;font-weight:700}
  #pop .ph b{font-size:14.5px}#pop .pb{padding:11px 13px;font-size:13px;line-height:1.6;color:var(--ink)}
  #pop .pb .sub{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-bottom:7px}
  #pop .x{margin-left:auto;cursor:pointer;color:var(--ink-dim);border:none;background:none;font-size:16px}

  .disc{background:linear-gradient(90deg,rgba(232,135,58,.10),rgba(232,135,58,.02));border:1px solid rgba(232,135,58,.3);border-radius:10px;padding:9px 13px;margin:12px 0 0;font-size:12.5px;color:#e9c9a6}.disc b{color:var(--amber)}
  footer{margin-top:20px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-faint);display:flex;flex-wrap:wrap;gap:6px 18px;justify-content:space-between}
  @media (max-width:860px){.stage-wrap{grid-template-columns:1fr}.side{position:static;flex-direction:row;flex-wrap:wrap}.card{flex:1;min-width:200px}.viewer{height:60vh}.hint{display:none}}

  /* ---------- 校准/编辑工具 ---------- */
  .exportbtn{cursor:pointer;font-size:14px;font-weight:800;color:#12161b;background:var(--amber);border:1px solid var(--amber);border-radius:10px;padding:10px 16px;box-shadow:0 4px 14px rgba(232,135,58,.35);font-family:var(--font-cjk)}
  .exportbtn:hover{filter:brightness(1.1)}
  .chgchip{font-family:var(--font-cjk);font-size:12px;color:var(--ink-dim);border:1px solid var(--line2);border-radius:999px;padding:6px 12px;background:var(--panel)}
  .chgchip b{color:#46B36B;font-size:14px;font-family:var(--font-mono)}
  .modebtn{cursor:pointer;font-size:13px;font-weight:700;color:var(--ink-dim);padding:8px 14px;border:1px solid var(--line2);border-radius:9px;background:var(--panel)}
  .modebtn.on{color:#0e1116;background:#4C9BE8;border-color:#4C9BE8}
  .howto{margin:0;padding-left:18px;font-size:12.5px;color:var(--ink-dim);line-height:1.75}
  .howto b{color:var(--ink)}
  .resetall{margin-top:9px;width:100%;cursor:pointer;font-size:12px;color:#e08585;background:none;border:1px solid #5a2e2e;border-radius:8px;padding:6px;font-family:var(--font-cjk)}
  .resetall:hover{border-color:#E5484D;color:#E5484D}
  .dellist{display:flex;flex-direction:column;gap:6px}
  .dellist button{cursor:pointer;text-align:left;font-size:12px;color:var(--ink-dim);background:var(--bg2);border:1px dashed var(--line2);border-radius:7px;padding:6px 9px;font-family:var(--font-cjk)}
  .dellist button:hover{color:#46B36B;border-color:#46B36B}
  .m.ed{pointer-events:auto;cursor:grab;touch-action:none}
  .m.ed:active{cursor:grabbing}
  body.painting .m.ed{pointer-events:none;opacity:.45}
  .m.ed::after{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 1.5px #000;opacity:.95;pointer-events:none}
  .m.ed .lbl{padding:3px 8px;border:1.5px dashed rgba(232,135,58,.5);border-radius:8px;background:rgba(14,17,22,.3)}
  .m.ed:hover .lbl{border-color:var(--amber);background:rgba(232,135,58,.14)}
  .m.ed.chg::after{background:#46B36B}
  .m.ed.chg .lbl{border-style:solid;border-color:#46B36B;background:rgba(70,179,107,.12)}
  .m.ed .bomb{border:2px dashed #fff8}
  .m.ed.chg .bomb{border:2px solid #46B36B;box-shadow:0 0 0 2px rgba(70,179,107,.4)}
  .m.ed.chg .hs{box-shadow:0 0 0 2.5px #46B36B}
  .hstag{position:absolute;left:17px;top:50%;transform:translateY(-50%);white-space:nowrap;font-size:10px;color:var(--ink-dim);text-shadow:0 1px 2px #000;background:rgba(10,14,19,.66);padding:1px 6px;border-radius:4px;pointer-events:none}
  #mini{position:fixed;z-index:40;display:none;background:#0c1119;border:1px solid var(--line2);border-radius:10px;box-shadow:var(--sh);padding:7px 8px}
  #mini .mt{font-size:12px;font-weight:800;color:var(--ink);margin:0 2px 6px;white-space:nowrap}
  #mini .mb{display:flex;gap:6px}
  #mini button{cursor:pointer;font-size:12px;color:var(--ink);background:var(--bg2);border:1px solid var(--line2);border-radius:7px;padding:5px 9px;white-space:nowrap;font-family:var(--font-cjk)}
  #mini button:hover{border-color:var(--amber);color:var(--amber)}
  #mini button.danger:hover{border-color:#E5484D;color:#E5484D}
  #modal{position:fixed;inset:0;z-index:50;display:none;background:rgba(5,8,12,.74);backdrop-filter:blur(3px);align-items:center;justify-content:center;padding:20px}
  #modal .mbox{width:min(680px,94vw);background:var(--panel);border:1px solid var(--line2);border-radius:14px;box-shadow:var(--sh);padding:14px 16px}
  #modal .mh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  #modal .mh b{font-size:15px}
  #modal .mh #mstatus{font-size:12.5px;font-weight:700}
  #modal .mh .x{margin-left:auto;cursor:pointer;color:var(--ink-dim);border:none;background:none;font-size:18px}
  #mtext{width:100%;height:210px;resize:vertical;background:#0b0f14;color:#b9c6d4;border:1px solid var(--line);border-radius:9px;padding:9px;font-family:var(--font-mono);font-size:11px;line-height:1.5}
  #modal .mbtns{display:flex;gap:8px;margin-top:10px}
  #modal .mbtns button{cursor:pointer;flex:1;font-size:13.5px;font-weight:700;color:var(--ink);background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:9px;font-family:var(--font-cjk)}
  #modal .mbtns button:hover{border-color:var(--amber);color:var(--amber)}
  #modal .mnote{margin:9px 0 0;font-size:12px;color:var(--ink-faint)}
  /* 调色板 */
  #palcard .pal{display:flex;flex-direction:column;gap:5px}
  #palcard.flash{border-color:var(--amber);box-shadow:0 0 0 2px rgba(232,135,58,.45)}
  #savewarn{position:sticky;top:0;z-index:60;background:#4a3c14;color:#ffd98a;border-bottom:1px solid #8a6d2f;padding:9px 14px;font-size:13px;font-weight:600;text-align:center;font-family:var(--font-cjk)}
  .pbtn{cursor:pointer;display:flex;align-items:center;gap:8px;border:1px solid var(--line2);background:var(--bg2);border-radius:8px;padding:6px 9px;font-size:12.5px;font-weight:600;color:var(--ink-dim);font-family:var(--font-cjk);text-align:left}
  .pbtn .chip{width:14px;height:14px;border-radius:4px;flex:0 0 auto;border:1px solid #0008}
  .pbtn.on{color:var(--ink);border-color:var(--amber);background:rgba(232,135,58,.12)}
  .paltools{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .paltools button{cursor:pointer;font-size:12px;color:var(--ink);background:var(--bg2);border:1px solid var(--line2);border-radius:7px;padding:5px 9px;font-family:var(--font-cjk)}
  .paltools button:hover{border-color:var(--amber);color:var(--amber)}
  .paltools button.on{border-color:#4C9BE8;color:#4C9BE8}

#armchip{user-select:none}
#armchip.nomore{background:rgba(229,72,77,.25);border-color:#E5484D;color:#ffb4b6;transition:none}

/* 防守装修卡 */
.armrow{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:700;padding:6px 8px;border:1px solid var(--line2);border-radius:8px;background:var(--bg2);margin-bottom:7px}
.armrow .armn-wrap{color:var(--amber)}
.armrow.nomore{border-color:#E5484D;background:rgba(229,72,77,.18)}
.gpal{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:2px 0 7px}
.gsec{grid-column:1/-1;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;color:var(--ink-faint);margin:5px 0 0;padding-bottom:2px;border-bottom:1px dashed var(--line)}
.gbtn{cursor:pointer;border:1px solid var(--line2);background:var(--bg2);border-radius:7px;padding:4px 6px;font-size:10.5px;color:var(--ink);display:flex;align-items:center;gap:4px;min-width:0}
.gbtn .gi{flex:0 0 auto}
.gbtn .gn{font-weight:600;min-width:0;flex:1;line-height:1.25;word-break:break-word}
.gbtn .gc{color:var(--ink-faint);font-size:9px;white-space:nowrap;flex:0 0 auto}
.gbtn.on{border-color:var(--amber);background:rgba(232,135,58,.14)}
.gbtn.on .gc{color:var(--amber)}
.gbtn.empty{opacity:.4}
.gbtn.flash{border-color:#E5484D;background:rgba(229,72,77,.22)}
.gad{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;border:2px solid rgba(255,255,255,.65);box-shadow:0 2px 6px #000a;cursor:pointer;pointer-events:auto}
.resetall.confirm{background:#E5484D;color:#fff;border-color:#E5484D}

/* 包点选择器 */
.sitegrp{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-faint);font-weight:600}
.sbtn{cursor:pointer;font-size:11.5px;font-weight:600;color:var(--ink-dim);padding:6px 9px;border:1px solid var(--line2);border-radius:8px;background:var(--panel)}
.sbtn.on{color:#12161b;background:#E5484D;border-color:#E5484D}

/* 保存成图 */
.saveimg{display:block;width:100%;cursor:pointer;font-size:12.5px;font-weight:700;color:#12161b;background:var(--amber);border:1px solid var(--amber);border-radius:8px;padding:8px 0;margin-bottom:6px;text-align:center;text-decoration:none}
.saveimg:hover{filter:brightness(1.08)}
#expmodal{display:none;position:fixed;inset:0;z-index:60;background:rgba(5,8,12,.8);align-items:center;justify-content:center;padding:20px}
#expmodal .ebox{background:var(--panel);border:1px solid var(--line2);border-radius:14px;max-width:min(920px,94vw);max-height:92vh;display:flex;flex-direction:column;padding:14px 16px;gap:10px}
#expmodal .eh{display:flex;align-items:center;justify-content:space-between;font-size:14px}
#expmodal .eh .x{cursor:pointer;border:none;background:none;color:var(--ink-dim);font-size:18px}
#expmodal img{max-width:100%;min-height:0;object-fit:contain;border:1px solid var(--line);border-radius:8px;flex:1;overflow:auto}
#expmodal .ebtns{display:flex;justify-content:center}
#expmodal .ebtns .saveimg{width:auto;padding:8px 26px;margin:0}
#expmodal .mnote{font-size:11px;color:var(--ink-faint);text-align:center;margin:0}

/* 排版打磨 2026-07-07 */
.bar{row-gap:8px}
.bar2{margin-top:2px;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:rgba(17,22,29,.55)}
.barlabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.15em;color:var(--ink-faint);margin-right:2px}
.tog:hover{border-color:var(--amber)}
.sbtn:hover{border-color:#E5484D;color:var(--ink)}
.fbtn:hover{border-color:var(--amber);color:var(--ink)}
.legcard summary{cursor:pointer;list-style:none;user-select:none}
.legcard summary::-webkit-details-marker{display:none}
.legcard summary h3{margin:0;display:flex;align-items:center}
.legcard summary .fold{margin-left:auto;font-size:10px;color:var(--ink-faint);font-weight:500}
.legcard details[open] .leg{margin-top:9px}
.legcard details:not([open]) summary .fold::after{content:""}
@media (max-width:860px){.side{flex-direction:column}.card{min-width:0}}

/* 道具分组折叠 + 侧栏限高 */
.gdet{border-bottom:1px dashed var(--line)}
.gdet summary{cursor:pointer;list-style:none;user-select:none;display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;color:var(--ink-faint);padding:6px 2px}
.gdet summary::-webkit-details-marker{display:none}
.gdet summary:hover{color:var(--ink-dim)}
.gdet .garr::before{content:"▸ 展开"}
.gdet[open] .garr::before{content:"▾"}
.gdet .gpal{margin:0 0 7px}
.legcard .fold::before{content:"▸ 展开"}
.legcard details[open] .fold::before{content:"▾ 收起"}
.side{max-height:calc(100vh - 24px);overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin}
.side::-webkit-scrollbar{width:6px}
.side::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
@media (max-width:860px){.side{max-height:none;overflow:visible}}

/* 防守装修卡字号调大（2026-07-07 用户反馈看不清） */
#toolcard .armrow{font-size:13.5px;padding:8px 10px}
#toolcard .gsec{font-size:11px}
#toolcard .gdet summary{font-size:11px;letter-spacing:.08em;padding:8px 2px}
#toolcard .gbtn{font-size:12.5px;padding:7px 8px;gap:6px;border-radius:8px}
#toolcard .gbtn .gi{font-size:14px}
#toolcard .gbtn .gc{font-size:11px}
#toolcard .gpal{gap:5px}
#toolcard .note2f{font-size:12px;line-height:1.55}
#toolcard .saveimg{font-size:13.5px;padding:9px 0}
#toolcard .resetall{font-size:12.5px}

/* 地图切换器 */
.mapsw{display:inline-flex;align-items:center;gap:4px}
.mapsw .mapswlbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;color:var(--ink-faint);margin-right:3px}
.msw{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink-dim);padding:6px 13px;border:1px solid var(--line2);border-radius:8px;background:var(--panel);text-decoration:none}
.msw:hover{border-color:var(--amber);color:var(--ink)}
.msw.on{color:#12161b;background:var(--amber);border-color:var(--amber)}

.home-wrap{max-width:1060px;margin:0 auto;padding:48px 22px 60px}
.home-head{text-align:center;margin-bottom:38px}
.home-head .ey{font-family:var(--font-mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--amber);font-weight:600}
.home-head h1{font-size:34px;margin:12px 0 8px;font-weight:800;letter-spacing:.01em}
.home-head p{font-size:15px;color:var(--ink-dim);margin:0}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.mcard{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:15px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .16s,border-color .16s,box-shadow .16s}
.mcard:hover{transform:translateY(-4px);border-color:var(--amber);box-shadow:0 14px 34px rgba(0,0,0,.5)}
.mcov{aspect-ratio:16/10;background-size:cover;background-position:center;border-bottom:1px solid var(--line)}
.minfo{padding:14px 16px 16px}
.mtitle{font-size:19px;font-weight:800}
.mtitle .men{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--ink-faint);letter-spacing:.06em;margin-left:6px}
.mdesc{font-size:13px;color:var(--ink-dim);margin:6px 0 12px;line-height:1.5}
.mmeta{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mfl{font-size:11px;color:var(--ink-faint);font-family:var(--font-mono)}
.mgo{font-size:13px;font-weight:700;color:var(--amber)}
.home-foot{text-align:center;margin-top:40px;font-size:12px;color:var(--ink-faint);line-height:1.7}
.home-foot a{color:var(--ink-dim)}
